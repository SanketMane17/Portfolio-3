<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="128" height="128" fill="#0A0A0F"/>
  
  <!-- Gradient circle background -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00F5FF;stop-opacity:0.15" />
      <stop offset="70%" style="stop-color:#7C3AED;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#00F5FF;stop-opacity:0.05" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="64" cy="64" r="64" fill="url(#bgGradient)"/>
  
  <!-- Neon cyan S -->
  <text x="64" y="72" font-size="90" font-weight="bold" text-anchor="middle" fill="#00F5FF" font-family="Arial, sans-serif" filter="url(#glow)">S</text>
</svg>
